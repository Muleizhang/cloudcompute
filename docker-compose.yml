services:
  opengauss:
    image: enmotech/opengauss:5.0.0
    container_name: gaussops-opengauss
    privileged: true
    user: root
    environment:
      GS_NODENAME: gaussops_node
      GS_PASSWORD: ${OPENGAUSS_PASSWORD:-Gauss@2026}
      GS_USERNAME: gaussdb
      GS_PORT: 5432
    ports:
      - "${OPENGAUSS_PORT:-5432}:5432"
    volumes:
      - opengauss_data:/var/lib/opengauss
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    container_name: gaussops-backend
    environment:
      APP_CORS_ORIGINS: "http://localhost:${FRONTEND_PORT:-8080}"
      DATABASE_HOST: ${DATABASE_HOST:-opengauss}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-postgres}
      DATABASE_USER: ${DATABASE_USER:-gaussdb}
      DATABASE_PASSWORD: ${OPENGAUSS_PASSWORD:-Gauss@2026}
      DATABASE_SSLMODE: disable
    depends_on:
      - opengauss
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: gaussops-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

  spark-master:
    build:
      context: ./spark
    container_name: gaussops-spark-master
    command: ["/opt/spark/sbin/start-master.sh"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    restart: unless-stopped

  spark-worker:
    build:
      context: ./spark
    container_name: gaussops-spark-worker
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-1}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-1g}
      SPARK_WORKER_WEBUI_PORT: 8081
    depends_on:
      - spark-master
    restart: unless-stopped

  spark-history:
    build:
      context: ./spark
    container_name: gaussops-spark-history
    command: ["/opt/spark/sbin/start-history-server.sh"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_HISTORY_OPTS: "-Dspark.history.fs.logDirectory=file:/tmp/spark-events -Dspark.history.ui.port=18080"
    volumes:
      - spark_events:/tmp/spark-events
    ports:
      - "${SPARK_UI_PORT:-4040}:18080"
    restart: unless-stopped

  spark-analytics:
    build:
      context: ./spark
    container_name: gaussops-spark-analytics
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-opengauss}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-postgres}
      DATABASE_USER: ${DATABASE_USER:-gaussdb}
      DATABASE_PASSWORD: ${OPENGAUSS_PASSWORD:-Gauss@2026}
      SPARK_DB_MAX_ATTEMPTS: 30
    depends_on:
      - opengauss
      - backend
      - spark-master
      - spark-worker
      - spark-history
    volumes:
      - spark_events:/tmp/spark-events
    restart: "no"

volumes:
  opengauss_data:
  spark_events:
